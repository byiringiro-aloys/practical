spring.application.name=Enterprise-Resource-Planning

# ── PostgreSQL ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/erp_db
spring.datasource.username=postgres
spring.datasource.password=root@123

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=erp-super-secret-key-for-jwt-signing-2026-rwanda-gov
app.jwt.expiration-ms=86400000

# ── Institution ──────────────────────────────────────────────────────────────
app.institution.name=Government of Rwanda

# ── Swagger / OpenAPI ────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.erp=INFO

